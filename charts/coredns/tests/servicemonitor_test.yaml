# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: ServiceMonitor Rendering Test

templates:
  - templates/servicemonitor.yaml

set:
  deployment:
    enabled: true
  prometheus:
    monitor:
      enabled: true
      namespace: monitoring
      interval: 15s
      scrapeTimeout: 10s
      scheme: https
      honorLabels: true
      tlsConfig:
        insecureSkipVerify: true
      relabelings:
        - sourceLabels: [__address__]
          targetLabel: instance
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: coredns_dns_request_duration_seconds.*
          action: keep
      additionalLabels:
        team: infra
      selector:
        matchLabels:
          my-custom-label: "true"
  customAnnotations:
    monitoring: "enabled"
  isClusterService: true

release:
  name: test-release
  namespace: default

tests:
  - it: should render ServiceMonitor with correct metadata and selector
    asserts:
      - isKind:
          of: ServiceMonitor

      - equal:
          path: metadata.name
          value: test-release-coredns

      - equal:
          path: metadata.namespace
          value: monitoring

      - equal:
          path: metadata.labels.team
          value: infra

      - equal:
          path: metadata.annotations.monitoring
          value: "enabled"

      - equal:
          path: spec.namespaceSelector.matchNames[0]
          value: default

      - equal:
          path: spec.selector.matchLabels.my-custom-label
          value: "true"

      - equal:
          path: spec.endpoints[0].port
          value: metrics

      - equal:
          path: spec.endpoints[0].interval
          value: 15s

      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: 10s

      - equal:
          path: spec.endpoints[0].scheme
          value: https

      - equal:
          path: spec.endpoints[0].honorLabels
          value: true

      - equal:
          path: spec.endpoints[0].tlsConfig.insecureSkipVerify
          value: true

      - equal:
          path: spec.endpoints[0].relabelings[0].targetLabel
          value: instance

      - equal:
          path: spec.endpoints[0].metricRelabelings[0].action
          value: keep
